name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  packages: write
  actions: write

jobs:
  BuildAndTest:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set Up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.0

      - name: Install Dependencies
        run: go mod tidy

      - name: Download Dependencies
        run: go mod download

      - name: Vet Project
        run: go vet ./...

      - name: Build Project
        run: go build ./...

      - name: Setup Test Infrastructure
        run: docker compose up -d --build

      - name: Run Tests
        run: go test ./... -v -cover

      - name: Workflow Cleanup
        uses: fgrzl/actions/workflow-cleanup@v0.0.6
