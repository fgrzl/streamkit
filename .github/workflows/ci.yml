name: CI

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
  push:
    branches:
      - "**"
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.golangci.yml'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.golangci.yml'
      - '.github/workflows/**'

permissions:
  contents: read
  packages: write
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  BuildAndTest:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set Up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Ensure dependencies
        run: go mod tidy

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: Pull Containers
        run: docker compose pull

      - name: Start Containers
        run: docker compose up -d

      - name: Build
        run: go build ./...

      - name: Run Tests
        run: go test ./... -v

      - name: Stop Containers
        if: always()
        run: docker compose down --volumes
