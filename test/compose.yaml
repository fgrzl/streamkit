services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: azurite
    hostname: azurite
    ports:
      - "10002:10002"
    command: >
      azurite
      --tableHost 0.0.0.0
      --location /data
      --skipApiVersionCheck
    environment:
      AZURITE_DISABLE_TABLE_PERSISTENCE: "true"
    volumes:
      - type: tmpfs
        target: /data
        tmpfs:
          size: 512m
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:10002/devstoreaccount1" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
